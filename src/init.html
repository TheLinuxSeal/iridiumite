        <option value="github">Load Iridiumite (source: github)</option>

<script>
const iridiumiteinit_045a8ba2_p = document.getElementById('iridiumiteinit-045a8ba2-p'),
      iridiumiteinit_045a8ba2_jsd = document.getElementById('iridiumiteinit-045a8ba2-jsd'),
      iridiumiteinit_045a8ba2_gh = document.getElementById('iridiumiteinit-045a8ba2-gh'),
      iridiumiteinit_045a8ba2_i = document.getElementById('iridiumiteinit-045a8ba2-i'),
      iridiumiteinit_045a8ba2_f = document.getElementById('iridiumiteinit-045a8ba2-f'),
      iridiumiteinit_045a8ba2_t = document.getElementById('iridiumiteinit-045a8ba2-t'),
      iridiumiteinit_045a8ba2_m = document.getElementById('iridiumiteinit-045a8ba2-m'),
      iridiumiteinit_045a8ba2_tt = document.getElementById('iridiumiteinit-045a8ba2-td');

function iridiumiteinit_045a8ba2_updateUI() {
    iridiumiteinit_045a8ba2_i.style.display = iridiumiteinit_045a8ba2_p.value === 'custom' ? 'inline' : 'none';
    iridiumiteinit_045a8ba2_f.style.display = iridiumiteinit_045a8ba2_p.value === 'file' ? 'inline' : 'none';
    iridiumiteinit_045a8ba2_jsd.style.display = iridiumiteinit_045a8ba2_p.value === 'jsdelivr' ? 'inline' : 'none';
    iridiumiteinit_045a8ba2_gh.style.display = iridiumiteinit_045a8ba2_p.value === 'github' ? 'inline' : 'none';
    iridiumiteinit_045a8ba2_tt.style.display = iridiumiteinit_045a8ba2_p.value === 'textbox' ? 'inline' : 'none';
}
iridiumiteinit_045a8ba2_p.onchange = iridiumiteinit_045a8ba2_updateUI;
function iridiumiteinit_045a8ba2_idb_get() {
    return new Promise((resolve, reject) => {
        const req =
            indexedDB.open('iridiumite-db', 1);
        req.onupgradeneeded = function() {
            req.result.createObjectStore('files');
        };
        req.onsuccess = function() {
            const db = req.result;
            const tx =
                db.transaction('files', 'readonly');
            const store = tx.objectStore('files');
            const getReq = store.get('main');
            getReq.onsuccess = function() {
                resolve(getReq.result || '');
            };
            getReq.onerror = reject;
        };
        req.onerror = reject;
    });
}
function iridiumiteinit_045a8ba2_idb_set(html) {
    return new Promise((resolve, reject) => {
        const req =
            indexedDB.open('iridiumite-db', 1);
        req.onupgradeneeded = function() {
            req.result.createObjectStore('files');
        };
        req.onsuccess = function() {
            const db = req.result;
            const tx =
                db.transaction('files', 'readwrite');
            const store = tx.objectStore('files');
            store.put(html, 'main');
            tx.oncomplete = resolve;
            tx.onerror = reject;
        };
        req.onerror = reject;
    });
}
async function iridiumiteinit_045a8ba2_getHTML() {
    let url = '';
    let html = '';
    if (iridiumiteinit_045a8ba2_p.value === 'jsdelivr') url = iridiumiteinit_045a8ba2_jsd.value;
    else if (iridiumiteinit_045a8ba2_p.value === 'github') url = iridiumiteinit_045a8ba2_gh.value;
    else if (iridiumiteinit_045a8ba2_p.value === 'custom') url = iridiumiteinit_045a8ba2_i.value;
    if (iridiumiteinit_045a8ba2_p.value === 'file') {
        if (!iridiumiteinit_045a8ba2_f.files[0]) {
            alert('Select file');
            return null;
        }
        html = await iridiumiteinit_045a8ba2_f.files[0].text();
    } else if (iridiumiteinit_045a8ba2_p.value === 'textbox') {html = iridiumiteinit_045a8ba2_t.value;
    } else if (iridiumiteinit_045a8ba2_p.value === 'localstorage') {html = localStorage.getItem('iridiumite-html') || '';
    } else if (iridiumiteinit_045a8ba2_p.value === 'indexeddb') {html = await iridiumiteinit_045a8ba2_idb_get();
    } else if (
        iridiumiteinit_045a8ba2_p.value === 'console'
    ) {
        html = `<!DOCTYPE html>
<body style="width:99vw;height:99vh;margin:0.5vh 0.5vw;">
<div style="height:100%; display:flex; flex-direction:column;">
  <textarea id="sealboxinit-console-5f5760d4-o"
    readonly
    style="flex:9; width:100%; resize:none;"></textarea>
  <div style="flex:1; display:flex;">
    <textarea id="sealboxinit-console-5f5760d4-i"
      placeholder="Type JS..."
      style="flex:1; resize:none;"></textarea>
    <button id="sealboxinit-console-5f5760d4-b"
      style="width:80px;">
      Run
    </button>
  </div>
</div>
<script>
const sealboxinit_console_5f5760d4_i =
  document.getElementById('sealboxinit-console-5f5760d4-i'),
  sealboxinit_console_5f5760d4_o =
  document.getElementById('sealboxinit-console-5f5760d4-o'),
  sealboxinit_console_5f5760d4_b =
  document.getElementById('sealboxinit-console-5f5760d4-b');
function sealboxinit_console_5f5760d4_isAtBottom(el) {
  return el.scrollTop + el.clientHeight >= el.scrollHeight - 2;
}
function sealboxinit_console_5f5760d4_scrollIfNeeded(shouldStick) {
  if (shouldStick) {
    sealboxinit_console_5f5760d4_o.scrollTop =
      sealboxinit_console_5f5760d4_o.scrollHeight;
  }
}
sealboxinit_console_5f5760d4_i.oninput = function() {
  this.style.height = 'auto';
  this.style.height = this.scrollHeight + 'px';
};
const sealboxinit_console_5f5760d4_exec = function() {
  const shouldStick =
    sealboxinit_console_5f5760d4_isAtBottom(sealboxinit_console_5f5760d4_o);
  const originalLog = console.log;
  const originalError = console.error;
  const originalWarn = console.warn;
  const originalInfo = console.info;
  const originalDebug = console.debug;
  function writeToConsole(prefix, args) {
    const msg = Array.from(args).join(' ');
    sealboxinit_console_5f5760d4_o.value += prefix + msg + '\\n';
  }
  console.log = function(...args) {
    writeToConsole('[LOG] ', args);
    originalLog.apply(console, args);
  };
  console.error = function(...args) {
    writeToConsole('[ERROR] ', args);
    originalError.apply(console, args);
  };
  console.warn = function(...args) {
    writeToConsole('[WARN] ', args);
    originalWarn.apply(console, args);
  };
  console.info = function(...args) {
    writeToConsole('[INFO] ', args);
    originalInfo.apply(console, args);
  };
  console.debug = function(...args) {
    writeToConsole('[DEBUG] ', args);
    originalDebug.apply(console, args);
  };
  try {
    var sealboxinit_console_5f5760d4_res =
      eval(sealboxinit_console_5f5760d4_i.value);
    if (sealboxinit_console_5f5760d4_res !== undefined) {
      sealboxinit_console_5f5760d4_o.value +=
        '> ' + sealboxinit_console_5f5760d4_i.value + '\\n' +
        sealboxinit_console_5f5760d4_res + '\\n';
    }
  } catch (sealboxinit_console_5f5760d4_e) {
    console.error(sealboxinit_console_5f5760d4_e.message);
  }
  console.log = originalLog;
  console.error = originalError;
  console.warn = originalWarn;
  console.info = originalInfo;
  console.debug = originalDebug;
  sealboxinit_console_5f5760d4_i.value = '';
  sealboxinit_console_5f5760d4_i.style.height = 'auto';
  sealboxinit_console_5f5760d4_scrollIfNeeded(shouldStick);
};
sealboxinit_console_5f5760d4_b.onclick =
  sealboxinit_console_5f5760d4_exec;
</`+`script></body>`;
    } else {
        try {
            const res = await fetch(url);
            html = await res.text();
        } catch (e) {
            alert('CORS Error. Try Iframe or Navigate.');
            return null;
        }
    }
    return html;
}


async function iridiumiteinit_045a8ba2_boot() {
    const html = await iridiumiteinit_045a8ba2_getHTML();
    //if (html === null)
    //    return;
    const mode = iridiumiteinit_045a8ba2_m.value;
    /* SAVE MODES */
    if (mode === 'save-localstorage') {
        localStorage.setItem('iridiumite-html',html);
        alert('Saved to localStorage');
        return;
    }
    if (mode === 'save-indexeddb') {
        await iridiumiteinit_045a8ba2_idb_set(html);
        alert('Saved to IndexedDB');
        return;
    }
    if (mode === 'save-download') {
        const blob =
            new Blob([html], {
                type: 'text/html'
            });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'iridiumite.html';
        a.click();
        return;
    }
    if (mode === 'save-textbox') {
        iridiumiteinit_045a8ba2_tt.style.display = S'inline';
        iridiumiteinit_045a8ba2_t.value = html;
        alert('Saved into textbox.');
        return;
    }
    /* LOAD MODES */
    if (mode === 'replace') {
        document.open();
        document.write(html);
        document.close();
    } else if (mode === 'iframe') {
        let src = '';
        if ( iridiumiteinit_045a8ba2_p.value === 'jsdelivr') src = iridiumiteinit_045a8ba2_jsd.value;
        else if ( iridiumiteinit_045a8ba2_p.value === 'github') src = iridiumiteinit_045a8ba2_gh.value;
        else if ( iridiumiteinit_045a8ba2_p.value === 'custom') src = iridiumiteinit_045a8ba2_i.value;
        else if ( iridiumiteinit_045a8ba2_p.value === 'console') src = "https://thelinuxseal.github.io/latest/console.html";
        document.body.innerHTML =
            '<iframe src="' +
            src +
            '" style="width:100%;height:100%;border:none"></iframe>';
    } else if (mode==="iframe-html") {
        document.body.innerHTML =
        '<iframe srcdoc="' +
        html +
        '" style="width:100%;height:100%;border:none"></iframe>';
    } else if (mode === 'blank') {
        const win = window.open('about:blank');
        win.document.write(html);
    } else if (mode === 'blob') {
        const blob =
            new Blob([html], {
                type: 'text/html'
            });
        window.location.href = URL.createObjectURL(blob);

    } else if (mode === 'bookmarklet') {
        iridiumiteinit_045a8ba2_tt.style.display = 'inline';
        iridiumiteinit_045a8ba2_t.value = `javascript:document.open();document.write(${JSON.stringify(html)});document.close();`;
    } else if (mode === 'nav') {
        let url = '';
        if (iridiumiteinit_045a8ba2_p.value === 'jsdelivr' ) url = iridiumiteinit_045a8ba2_jsd.value;
        else if (iridiumiteinit_045a8ba2_p.value === 'github') url = iridiumiteinit_045a8ba2_gh.value;
        else if ( iridiumiteinit_045a8ba2_p.value === 'custom') url = iridiumiteinit_045a8ba2_i.value;
        else if ( iridiumiteinit_045a8ba2_p.value === 'console') url = "https://thelinuxseal.github.io/latest/console.html";
        window.location.href = url;
    }
}
iridiumiteinit_045a8ba2_updateUI();
</script>
